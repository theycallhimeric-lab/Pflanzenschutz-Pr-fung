  {c:"Biologie", q:"Was ist die Quecke (Elymus repens) und warum ist sie mit Blatt-Herbiziden im Getreide kaum zu bekämpfen?", o:["Ausdauerndes Rhizomgras; im stehenden Getreide ist eine Bekämpfung unmöglich, da alle zugelassenen Blatt-Herbizide auch das Getreide schädigen würden; Bekämpfung nur mit Glyphosat nach der Ernte oder im Stoppelfeld","Quecke kann im Herbst problemlos mit Sulfonylharnstoffen bekämpft werden","Quecke stirbt im Winter ab","Quecke ist eine einjährige Pflanze ohne Rhizome"], a:0, e:"Quecke und Winterweizen sind beide Gräser – alle ACCase-Hemmer und viele ALS-Hemmer würden das Getreide genauso schädigen. Die Bekämpfung erfolgt daher im Stoppelfeld mit systemischen Totalherbiziden (Glyphosat) oder durch Fruchtfolgemaßnahmen."},
  {c:"Biologie", q:"Was versteht man unter 'Target-Site-Resistenz' (Zielort-Resistenz) bei Unkräutern, und welches bekannte Beispiel gibt es?", o:["Mutation an der Zielstruktur des Herbizids im Unkraut, sodass der Wirkstoff nicht mehr binden kann; klassisches Beispiel: ACCase-Resistenz (HRAC A) bei Ackerfuchsschwanz durch Aminosäureaustauch im ACCase-Gen","Das Unkraut baut den Wirkstoff enzymatisch ab","Das Unkraut keimt zu einem anderen Zeitpunkt","Die Wachsschicht verhindert die Aufnahme des Wirkstoffs"], a:0, e:"Target-Site-Resistenz ist meist monogen (eine Mutation genügt) und kann durch Wirkstoffwechsel (andere HRAC-Gruppe) umgangen werden – im Gegensatz zur metabolischen Resistenz, die meist breitere Resistenz verleiht."},
  {c:"Biologie", q:"Was ist Taubnessel (Lamium spp.) und in welcher Hinsicht unterscheidet sie sich im Bekämpfungsaufwand von echten Problemunkräutern wie AFU?", o:["Taubnessel ist ein jährlich keimender Selbstbestäuber ohne Resistenzproblematik; wirksam mit vielen Breitband-Herbiziden bekämpfbar; kein vergleichbares wirtschaftliches Gewicht wie AFU oder Windhalm","Taubnessel ist resistenter als AFU","Taubnessel hat tiefe Rhizome wie Quecke","Taubnessel bildet so viele Samen wie AFU"], a:0, e:"Taubnessel ist zwar häufig, aber agronomisch wenig problematisch: Kein massiver Ertragsverlust, keine bekannten Resistenzen, breites Herbizidspektrum wirksam. Im IPS-Kontext wird man selten spezifisch für Taubnessel behandeln."},

  // WIRKSTOFFE – Ergänzungen
  {c:"Wirkstoffe", q:"Was sind 'Kontaktfungizide' und was 'systemische Fungizide' – was ist der praktische Unterschied bei der Bekämpfung?", o:["Kontaktfungizide (z. B. Kupfer, Schwefel) bleiben auf der Blattoberfläche und verhindern Neuinfektionen; systemische Fungizide (z. B. Azole, Strobilurine) dringen ins Blattgewebe ein und können bestehende Infektionen kurativ bekämpfen","Kontaktfungizide wirken stärker als systemische","Systemische Fungizide sind wasserlöslich, Kontaktmittel nicht","Es gibt keinen praktischen Unterschied"], a:0, e:"Kontaktmittel sind rein protektiv – sie müssen vor der Infektion gleichmäßig auf der Blattoberfläche sein. Systemische Mittel dringen nach der Applikation in das Blattgewebe ein und können sogar bereits eingedrungene Pilzmyzele noch abtöten (kurativ)."},
  {c:"Wirkstoffe", q:"Was sind Azole (Triazol-Fungizide) und wie wirken sie auf Pilze?", o:["Sie hemmen die Ergosterol-Biosynthese (Demethylierungshemmer, DMI); Ergosterol ist ein essentieller Bestandteil der Pilzzellmembran – ohne es bricht die Membranintegrität zusammen","Sie zerstören die Pilzzellwand","Sie blockieren die Photosynthese des Pilzes","Sie hemmen die Sporenbildung durch Austrocknung"], a:0, e:"Azole (z. B. Propiconazol, Prothioconazol, Tebuconazol) sind FRAC-Gruppe 3 (DMI-Hemmer). Sie sind systemisch, kurativ und breit wirksam. Resistenz entsteht durch Akkumulation von Punktmutationen (CYP51-Gen) – daher immer mit anderen Gruppen kombinieren."},
  {c:"Wirkstoffe", q:"Was sind SDHI-Fungizide (Carboxamide, FRAC Gruppe 7) und bei welchen Kulturen werden sie häufig eingesetzt?", o:["Succinatdehydrogenase-Inhibitoren, die den mitochondrialen Atmungskomplex II blockieren; häufig im Getreide (Bixafen, Fluxapyroxad) und Raps eingesetzt – oft in Mischung mit Azolen zur Resistenzprophylaxe","Sie blockieren die Zellteilung in Pilzen","Sie hemmen die Sporenkeimung auf der Blattoberfläche","Sie sind Bodenbehandlungsmittel ohne Blattwirkung"], a:0, e:"SDHIs sind eine moderne, hoch wirksame Fungizidgruppe mit systemischer und kurativer Wirkung. Da auch hier Resistenzen entstehen (SDHI-Resistenz in Botrytis, Cercospora), ist der Wechsel mit anderen Gruppen (v. a. FRAC 3 + 11) unverzichtbar."},
  {c:"Wirkstoffe", q:"Was versteht man unter 'Formulierung' eines Pflanzenschutzmittels und warum ist sie wichtig?", o:["Die Art der Zubereitung (z. B. EC = emulgierbares Konzentrat, WG = wasserdispergierbares Granulat, SC = Suspension); sie bestimmt Lösungsverhalten, Abdriftneigung, Einarbeitung und Anwendungssicherheit","Nur der Markenname des Produkts","Die Farbe des Wirkstoffs","Die Registriernummer beim BVL"], a:0, e:"Die Formulierung beeinflusst massiv die Handling-Sicherheit (EC = Lösemittel, WG = staubfrei, SC = Suspension). WG- und SC-Formulierungen sind sicherer im Umgang und reduzieren das Expositionsrisiko bei der Anmischung."},
  {c:"Wirkstoffe", q:"Was sind 'Pyrethroide' (IRAC Gruppe 3A) und warum können sie für Bienen und Nützlinge problematisch sein?", o:["Synthetische Nachahmer natürlicher Pyrethrine; sie blockieren Natriumkanäle in Nervenzellen und töten Insekten durch Dauererregung; Problem: breites Wirkspektrum erfasst auch Nützlinge und Bienen, besonders bei Direktkontakt","Pyrethroide sind bienensicher","Pyrethroide wirken nur auf Pilze","Pyrethroide sind Bodenmittel ohne Blattwirkung"], a:0, e:"Pyrethroide sind sehr wirksam gegen Schädlinge, aber auch gegen Bienen, Marienkäfer und andere Nützlinge. Sie sollten nie in der Blüte oder bei Bienenflug eingesetzt werden. Nach Antrocknen ist die Kontaktgefahr für Bienen deutlich geringer."},
  {c:"Wirkstoffe", q:"Was ist 'Kupfer' als Pflanzenschutzmittel, und warum wird seine Anwendungsmenge in der EU begrenzt?", o:["Kupfer (Kupferhydroxid, -oxychlorid) ist ein Kontaktfungizid und -bakterizid; Begrenzung auf max. 3 kg Kupfer/ha/Jahr (7-Jahres-Durchschnitt) wegen Anreicherung im Boden, Toxizität für Regenwürmer und Bodenmikroben","Kupfer fördert das Pflanzenwachstum und ist unbegrenzt einsetzbar","Kupfer ist nur für den Weinbau problematisch","Die Begrenzung gilt nur für konventionelle Betriebe"], a:0, e:"Kupfer ist im Bio-Anbau unverzichtbar (z. B. gegen Phytophthora, Falschen Mehltau), reichert sich aber im Boden an und schädigt bei hohen Gehalten Regenwürmer und Bodenmikroorganismen. Die 3-kg-Obergrenze ist ein Kompromiss zwischen Wirksamkeit und Umweltschutz."},
  {c:"Wirkstoffe", q:"Was sind 'Herbizidkombinationen' und welchen strategischen Vorteil haben sie gegenüber Einzelmitteln?", o:["Mischungen aus Wirkstoffen verschiedener HRAC-Gruppen; sie bekämpfen ein breiteres Unkrautspektrum, verringern das Resistenzrisiko durch mehrfache Wirkort-Belastung und ermöglichen niedrigere Einzelwirkstoffdosen","Kombis sind immer teurer ohne Mehrwert","Kombis wirken schlechter als Einzelmittel","Kombis sind nur für Biobetriebe gedacht"], a:0, e:"Durch die Kombination verschiedener Wirkmechanismen in einem Arbeitsgang wird jedes Individuum einer Unkrautpopulation von mehreren verschiedenen Wirkstoffen angegriffen – die Wahrscheinlichkeit, dass ein Individuum gegen alle gleichzeitig resistent ist, ist sehr gering."},
  {c:"Wirkstoffe", q:"Was ist Chlormequat (CCC) und in welcher Wirkstoffgruppe der Wachstumsregulatoren ist es einzuordnen?", o:["Ein Halmverkürzer (Wachstumsregulator); hemmt die Gibberellin-Biosynthese in Getreide → kürzere, stabilere Halme, höhere Standfestigkeit; Einsatz im Frühjahr bei Lager-Gefahr","Ein Herbizid gegen Gräser","Ein Fungizid gegen Halmbruch","Ein Insektizid gegen Blattläuse"], a:0, e:"Chlormequat (und andere Ethephon-/Trinexapac-Ethyl-Produkte) verkürzen den Halm durch Reduktion der Internodienlänge. Das reduziert das Lagerrisiko, erhöht die Erntesicherheit und verbessert die Düngungseffizienz in intensiven Weizenbeständen."},
  {c:"Wirkstoffe", q:"Was versteht man unter 'Wirkungsgrad' und 'biologischer Effizienz' bei der Beurteilung von Pflanzenschutzmitteln?", o:["Wirkungsgrad = prozentualer Anteil des bekämpften Schaderregers; biologische Effizienz = Relation zwischen erreichtem Wirkungsgrad und dem erzielten Mehrertrag; beide müssen wirtschaftlich sein","Wirkungsgrad = Toxizität für Menschen","Biologische Effizienz = Aufwandmenge pro Hektar","Beide Begriffe sind identisch"], a:0, e:"Ein Wirkungsgrad von 90 % bedeutet: 10 % der Population überlebt. Bei sehr hohem Befallsdruck reicht das eventuell nicht aus. Biologische Effizienz bewertet, ob die Bekämpfung auch wirtschaftlich einen Mehrertrag erzeugt hat."},

  // TECHNIK – Spezial
  {c:"Technik", q:"Was ist ein 'Direkteinspeisung-System' (Direct Injection) bei modernen Pflanzenschutzspritzen und welchen Vorteil bringt es?", o:["Das PSM-Konzentrat wird erst kurz vor der Düse in den Wasserstrom dosiert – kein Anmischen im Tank nötig; präzise Dosierung, sofortiger Stopp ohne Restbrühe, Wirkstoffwechsel im Betrieb möglich","Ein System zur direkten Einleitung von Abwasser in den Boden","Eine Methode zur Druckerhöhung","Ein Rührwerk mit direktem Motorantrieb"], a:0, e:"Direkteinspeisung revolutioniert die Anwendung: kein Anmischen, keine Restbrühe, keine Kreuzkontamination zwischen Mitteln. Der Computer dosiert sekundengenau – das reduziert PSM-Verbrauch und Reinigungsaufwand erheblich."},
  {c:"Technik", q:"Warum ist bei abrasiven PSM-Formulierungen (z. B. WP = Spritzpulver) besonders auf die Filterpflege und Pumpenwahl zu achten?", o:["Abrasive Partikel verschleißen Düsen, Pumpenventile und Membranen erheblich schneller als gelöste Formulierungen; empfehlenswert: häufigeres Auslitern, Keramik- oder Edelstahlbauteile, feine Düsenfilter","WP-Formulierungen sind nicht abrasiv","Filter werden bei WP nicht benötigt","Rollenpumpen sind besser für WP geeignet"], a:0, e:"WP-Formulierungen enthalten unlösliche Partikel (Kaolin, Talk, Wirkstoff-Kristalle), die wie ein Schleifmittel wirken. Keramikdüsen und -pumpenteile sind deutlich widerstandsfähiger und verlängern die Standzeit wesentlich."},
  {c:"Technik", q:"Was versteht man unter 'Partial-Width-Control' und wie unterscheidet es sich von Full Section Control?", o:["Partial-Width: Einzeldüsenabschaltung (jede Düse separat schaltbar); Full Section Control: Abschalten ganzer Gruppen (z. B. 5-m-Sektionen); Einzeldüsenabschaltung ist präziser und spart mehr PSM","Beide sind identisch","Partial-Width bezieht sich auf die Fahrgeschwindigkeit","Full Section Control ist nur für Großbetriebe relevant"], a:0, e:"Einzeldüsenabschaltung (z. B. über Pulse-Width-Modulation) ermöglicht exakteste Konturen an Feldgrenzen und minimiert Überlappungen auf wenige Zentimeter. Full Section Control arbeitet mit größeren Blöcken und ist günstiger, aber ungenauer."},
  {c:"Technik", q:"Was ist der Unterschied zwischen einer 'Schleppschlauch-' und einer 'Schleppschuh-Gülle'applikation im Hinblick auf den Pflanzenschutz?", o:["Schleppschlauch legt Gülle zwischen die Reihen ohne Benetzung der Pflanzen; Schleppschuh drückt Gülle direkt in den Boden – beide reduzieren NH3-Verluste; direkter Pflanzenschutzbezug: weniger N-Spritzung nach optimierter Gülleapplikation nötig","Schleppschlauch ist nur für PSM, nicht für Gülle","Schleppschuh erhöht die Abdrift","Kein Zusammenhang zum Pflanzenschutz"], a:0, e:"Dieser Bezug ist im IPS relevant: optimierte Nährstoffversorgung (weniger Stress) macht Pflanzen widerstandsfähiger gegen Krankheiten und reduziert indirekt den Fungizideinsatz. Der IPS betrachtet immer das Gesamtsystem."},

  // RECHT – Spezialwissen
  {c:"Recht", q:"Was regelt die 'Pflanzenschutz-Anwendungsverordnung' (PflSchAnwV) und welche Besonderheiten gelten für Naturschutzgebiete?", o:["Sie enthält absolute Anwendungsverbote für bestimmte Wirkstoffgruppen in sensiblen Gebieten (z. B. Herbizide in Naturschutzgebieten auf Dauergrünland, Gewässerrandstreifen); in NSG gelten strengere Abstandsregelungen als die Zulassungsauflagen","Sie regelt nur die Lagerung von PSM","Naturschutzgebiete haben keine besonderen Regeln","Sie gilt nur für den ökologischen Landbau"], a:0, e:"Die PflSchAnwV ist ein bundesweit geltendes Regelwerk mit Anwendungsverboten, die über die Produktzulassung hinausgehen. In Naturschutzgebieten können landesrechtliche Verschärfungen zusätzlich gelten."},
  {c:"Recht", q:"Darf man ein zugelassenes PSM in einer Anwendung einsetzen, die nicht auf dem Etikett steht (z. B. auf einer nicht aufgeführten Kultur)?", o:["Nein – die Anwendung muss exakt den Zulassungsbedingungen entsprechen; Ausnahmen nur über Genehmigung für geringfügige Verwendung (§ 22 PflSchG) oder Notfallzulassung","Ja, wenn die Aufwandmenge kleiner ist","Ja, wenn das Mittel gegen denselben Erreger wirkt","Ja, wenn der Betrieb Bio-zertifiziert ist"], a:0, e:"Die Off-Label-Anwendung ist in Deutschland grundsätzlich verboten. Das Etikett ist die rechtliche Grundlage. Verstöße können zu Bußgeldern, Rückstands-Überschreitungen und Verlust der Zulassung führen."},
  {c:"Recht", q:"Was ist die 'Wartezeit' eines Pflanzenschutzmittels und warum darf sie nicht unterschritten werden?", o:["Mindestabstand in Tagen zwischen letzter Anwendung und Ernte, der sicherstellt, dass Rückstände unter dem MRL-Grenzwert liegen; Unterschreitung führt zu MRL-Überschreitung und Vermarktungsverbot","Abstand zwischen zwei Spritzungen derselben Kultur","Wartezeit = Wirkungsdauer des Mittels","Wartezeit = Frist vor der nächsten Aussaat"], a:0, e:"Die Wartezeit (z. B. 14 Tage, 28 Tage, 60 Tage) ist durch Rückstandsversuche der Hersteller ermittelt. Nach Ablauf sind die Rückstände auf oder unter dem MRL-Wert. Jede Unterschreitung ist ein Rechtsverstoß mit Vermarktungskonsequenzen."},
  {c:"Recht", q:"Was besagt die Pflicht zur 'Geräteprüfung' für den Betrieb und wer führt sie durch?", o:["Alle im Betrieb eingesetzten Feldspritzen müssen im vorgeschriebenen Intervall (3 Jahre) durch eine amtlich anerkannte Prüfstelle geprüft werden; der Prüfnachweis ist bei Kontrollen vorzuzeigen","Prüfung durch den Traktorkauf-Händler","Selbstzertifizierung durch den Betrieb ist ausreichend","Nur Spritzen über 2.000 Liter müssen geprüft werden"], a:0, e:"Die Prüfpflicht (EU-Richtlinie 2009/128, deutsches Recht) soll sicherstellen, dass PSM korrekt und ohne unnötige Umweltbelastung ausgebracht werden. Nicht geprüfte Geräte können zum Entzug von Direktzahlungen führen."},

  // BIOLOGIE – Spurennährstoffe & Physiologie
  {c:"Biologie", q:"Welches Symptom entsteht bei Bormangel im Raps und warum ist Bor für Raps besonders wichtig?", o:["Markverbräunung im Stängel ('Stängelgallerte'), hohle Stängel, schlechter Schotenansatz und Blütensterilität; Bor ist für Zellwandstabilität und Pollenschlauch-Wachstum (Befruchtung) unverzichtbar","Gelbe Blätter ohne Nekrosen","Weißliche, eingerollte Blattspitzen","Massiver Rostbefall"], a:0, e:"Bormangel tritt bevorzugt auf leichten, auswaschungsanfälligen Böden auf. In Raps ist er besonders kritisch, weil der Pollenschlauch ohne Bor nicht korrekt durch den Griffel wachsen kann – die Befruchtung scheitert, Schoten bleiben leer."},
  {c:"Biologie", q:"Woran erkennt man Kupfermangel im Getreide und welche Bodenverhältnisse fördern ihn?", o:["Weiße bis gelblich-weiße, eingerollte Blattspitzen ('Peitschensymptom'), tauben Ährenspitzen und schlechter Kornansatz; fördernde Böden: hohe pH-Werte, hohe organische Substanz (Moor), sehr leichte Sandböden","Rote Blattränder bei Normalboden","Massiver Mehltaubefall","Wassergestreifte braune Flecken"], a:0, e:"Kupfer ist für die Ligninbildung (Halm- und Zellwandstabilität) sowie das Enzym-System der Pollenkornentwicklung wichtig. Entwässerte Moorböden und anmoorige Böden mit hohem pH und Humusgehalt sind klassische Kupfermangel-Standorte."},
  {c:"Biologie", q:"Was ist Phosphormangel bei jungen Maispflanzen und wann tritt er typischerweise auf?", o:["Rötlich-violette Verfärbung der Blätter (Anthocyan-Einlagerung) besonders an Blatträndern und Unterseite; typisch bei Kälte im Frühjahr, weil Phosphoraufnahme bei niedrigen Bodentemperaturen gehemmt ist","Gelbe Streifen neben der Mittelrippe","Weißlicher Belag auf der Blattoberfläche","Braune Flecken in der Blattmitte"], a:0, e:"Phosphormangel-Symptome im Mais verschwinden oft von selbst, sobald sich der Boden erwärmt und die Phosphoraufnahme wieder funktioniert. Bei anhaltend kalten Böden oder auf sehr P-armen Böden ist eine Startdüngung sinnvoll."},
  {c:"Biologie", q:"Woran erkennt man Zinkmangel im Mais und auf welchen Böden tritt er am häufigsten auf?", o:["Weiße bis gelbliche Längsstreifen beiderseits der Blattmittelrippe ('Weißfärbung'), Wachstumsstau; häufig auf Böden mit hohem pH-Wert (> 7,0), kalkreich oder nach Kalkung","Rote Punkte auf der Blattoberfläche","Blaue Verfärbung der Wurzeln","Massive Bestockung ohne Höhenwachstum"], a:0, e:"Zink wird bei hohem pH-Wert im Boden festgelegt (Sorption an Calcit). Auf frisch gekalkten Flächen kann temporärer Zinkmangel auftreten. Blattdüngung mit Zinksulfat kann rasch helfen."},
  {c:"Biologie", q:"Was ist Manganmangel ('Dörrfleckenkrankheit') bei Getreide und in welchen Böden tritt er besonders auf?", o:["Graugrüne bis braune, trockene Flecken auf den Blättern; bei Gerste besonders ausgeprägt; tritt auf humosen, alkalischen Böden mit hohem Gehalt an organischer Substanz auf – Mangan wird festgelegt","Rote Verfärbung aller Blätter","Weiße, mehlige Beläge auf Blättern","Halmbruch an der Basis"], a:0, e:"Mangan ist für das Photosystem II unverzichtbar. Auf kalkhaltigen, anmoorigen und stark durchlüfteten Böden wird Mn²⁺ zu Mn⁴⁺ oxidiert und ist nicht mehr pflanzenverfügbar. Blattdüngung mit MnSO₄ wirkt schnell."},
  {c:"Biologie", q:"Was ist die Bedeutung der 'BBCH-Skala' und welches Stadium markiert BBCH 65 beim Weizen?", o:["Standardisierte Skala zur Beschreibung phänologischer Entwicklungsstadien aller Kulturpflanzen; BBCH 65 = volle Blüte (Anthese) – aller Ährenabschnitte in der Vollblüte; entscheidend für Fusarium-Ährenbehandlung","BBCH ist nur für Mais relevant","BBCH 65 = Erntereife","BBCH 65 = Beginn der Bestockung"], a:0, e:"Die BBCH-Skala ist international standardisiert (00–99). BBCH 65 ist das optimale Behandlungsstadium für Fusarium-Prophylaxe: Die Blüten sind offen (Infektionsfenster), aber noch nicht geschlossen. 24–48 Stunden nach Beginn des Ährenschiebens oft der beste Zeitpunkt."},

  // UMWELT – Spezial
  {c:"Umwelt", q:"Was ist der Unterschied zwischen 'punktuellem Eintrag' und 'diffusem Eintrag' von PSM in Gewässer?", o:["Punktuell: konkrete, lokalisierbare Einleitungsstelle (z. B. Hofablauf, Spritzenreinigung); diffus: flächiger Eintrag über Abdrift, Drainage oder Abschwemmung aus vielen Feldern","Punktuell ist gefährlicher als diffus","Diffus ist nur durch Dünger verursacht","Es gibt keinen Unterschied"], a:0, e:"Punktuelle Einträge können durch Betriebshygiene fast vollständig verhindert werden (Bio-Bed, Abfüllanlagen, Reinigungsprotokoll). Diffuse Einträge über Abdrift und Erosion erfordern systemische Maßnahmen (Pufferstreifen, Technik, Fruchtfolge)."},
  {c:"Umwelt", q:"Warum ist die Lagerung von Pflanzenschutzmitteln in einem separaten, gesicherten Raum gesetzlich vorgeschrieben?", o:["Brandschutz (viele PSM sind brennbar), Vermeidung von Umweltkontamination bei Undichtigkeiten, Schutz vor unbefugtem Zugang (Kinder, Unbefugte) und Trennung von Lebensmitteln","Nur wegen des Geruchs","Die Lagerung im Traktorschuppen ist vollkommen legal","Nur wenn mehr als 1.000 Liter gelagert werden"], a:0, e:"PSM-Lager müssen: verschlossen und gesichert sein, Auffangwanne mit ausreichendem Volumen haben, gut belüftet sein, Sicherheitsdatenblätter und Erste-Hilfe-Informationen bereithalten sowie von Lebensmitteln und Futtermitteln getrennt sein."},
  {c:"Umwelt", q:"Was bedeutet 'Bienenschutzauflage B2' und wie unterscheidet sie sich von B1 und B4?", o:["B2: Bienengefährlich – Anwendung nur nach dem täglichen Bienenflug erlaubt (Abend- oder Nachteinsatz); B1 = absolut verboten auf blühenden Beständen; B4 = nicht bienengefährlich (keine Einschränkung)","B2 ist identisch mit B1","B4 verbietet alle Spritzungen in der Nähe von Bienenstöcken","B2 gilt nur für Imker in der Nähe"], a:0, e:"B2-Mittel dürfen bei Bienenflug nicht eingesetzt werden, aber am Abend nach Ende des Flugs ist eine Anwendung möglich, sofern kein blühender Unterwuchs vorhanden ist. B3 (bienengefährlich, spezielle Einschränkungen) ist eine weitere Klasse."},
  {c:"Umwelt", q:"Was versteht man unter 'Drift als Dampf' (Dampfabdrift) und unter welchen Bedingungen ist sie besonders relevant?", o:["Verdunstung sehr feiner Tropfen oder flüchtiger Wirkstoffe (vor allem Pyrethroide, Herbizide mit niedrigem Dampfdruck) bei hohen Temperaturen; besonders relevant bei > 25 °C, direkter Sonneneinstrahlung und trockener Luft","Dampfabdrift entsteht nur bei Regen","Dampfabdrift ist nur bei Fungiziden ein Problem","Dampfabdrift ist harmlos für die Umwelt"], a:0, e:"Selbst wenn die Spritztropfen das Ziel treffen, können die flüchtigen Wirkstoff-Anteile noch Stunden nach der Applikation in die Luft abgegeben werden – besonders bei leichtflüchtigen Substanzen (z. B. bestimmte Herbizide wie Clomazone). Vorsicht bei Nachbarkulturen und Gewässern."},

  // BIOLOGIE – Prüfungsklassiker
  {c:"Biologie", q:"Was ist die 'Getreidezikade' und welche Schäden verursacht sie?", o:["Saugendes Insekt (Psammotettix alienus); direkte Saugschäden gering, aber die Zikade überträgt das Weizenverzwergungsvirus (WDV) – besonders im Herbst bei Spätsaaten gefährlich","Die Zikade frisst Körner in der Ähre","Die Zikade schädigt die Wurzeln","Die Zikade überträgt keine Viren – nur direkte Saugschäden"], a:0, e:"WDV (Wheat Dwarf Virus) kann zu Ertragsausfällen von über 50 % führen. Spätsaaten und warme Herbste erhöhen das Infektionsrisiko. Die Bekämpfung zielt auf die Zikaden als Vektoren – Saatzeitpunkt ist die wichtigste Vorbeugemaßnahme."},
  {c:"Biologie", q:"Was ist der 'Getreidelaufkäfer' und welche Rolle spielt er im Integrierten Pflanzenschutz?", o:["Ein Nützling (Carabidae); frisst Eier und Larven von Bodenschädlingen (Schnecken, Drahtwürmer, AFU-Samen) und Blattläuse; gefördert durch ungestörte Saumstrukturen und Verzicht auf Bodeninsektizide","Ein Schädling, der Körner frisst","Er überträgt Pflanzenviren","Er ist weder Nützling noch Schädling"], a:0, e:"Laufkäfer sind einer der wichtigsten Regulatoren von Bodenschädlingen und Unkrautsamen. Intensive Bodenbearbeitung und Insektizide dezimieren ihre Populationen – ein weiterer Grund für den schonenden Bodenangang im IPS."},
  {c:"Biologie", q:"Was ist die 'Weißstängeligkeit' in Raps und welcher Pilz verursacht sie?", o:["Sclerotinia sclerotiorum; weiß-wattige Myzelentwicklung an der Stängelbasis mit schwarzen Sklerotien; fördernde Faktoren: feuchte Witterung in der Blüte, zu frühe Blüte durch Schossförderer","Fusarium; braune Stängelverbräunung","Phoma; graue Flecken ohne Myzel","Botrytis; weicher Faulbereich ohne Sklerotien"], a:0, e:"Sclerotinia sclerotiorum infiziert über fallende Blütenblätter, die auf Blättern und Stengelgabeln liegen bleiben und als Nährstoffquelle dienen. Sklerotien überdauern jahrelang im Boden – enge Fruchtfolge und blütengezielte Fungizide sind die Hauptmaßnahmen."},
  {c:"Biologie", q:"Was ist 'Schwarzbeinigkeit' (Pythium spp., Rhizoctonia solani) bei Kartoffeln und Zuckerrüben?", o:["Pilzbefall am Keimling/Jungpflanze-Hypokotyl; der Stängelgrund schwärzt und schnürt sich ein – Pflanze fällt um; fördernde Faktoren: feuchte, kühle Böden, Bodenverdichtung","Ein Virus, der gelbe Blätter verursacht","Ein Käfer, der Stängel annagt","Nährstoffmangel durch schlechte Düngung"], a:0, e:"'Damping-off' (Umfallkrankheit) ist die gefährlichste Keimlingskrankheit. Rhizoctonia solani (AG 2-2 bei Rüben, AG 3 bei Kartoffeln) ist häufiger Erreger. Gute Drainagen und lockere Böden reduzieren das Risiko; Beize mit Thiram/Iprodion hilft vorbeugend."},
  {c:"Biologie", q:"Was ist die 'Viröse Vergilbung' der Zuckerrübe (Beet Yellows Virus, BYV / Beet Mild Yellowing Virus, BMYV) und welcher Schädling überträgt sie?", o:["Vergilbungsviren, übertragen durch die Grüne Pfirsichblattlaus (Myzus persicae); Symptome: Gelbfärbung der Blätter, Wachstumshemmung, bis zu 50 % Ertragsverlust","Überträger: Wühlmaus","Überträger: Drahtwurm","Überträger: Zikade"], a:0, e:"Die Grüne Pfirsichblattlaus ist der wichtigste Virusvektor bei Zuckerrüben. Durch den Wegfall von Neonikotinoid-Beizmitteln ist die Bekämpfung schwieriger geworden – Monitoring und Insektizideinsatz bei Schadschwellenüberschreitung sind jetzt entscheidend."},

  // ABSCHLUSS-BLOCK: letzte 10 Fragen
  {c:"Technik", q:"Was bedeutet 'Einzeldüsenschaltung' mit PWM (Pulse-Width Modulation) und welchen Vorteil bietet sie gegenüber klassischer Druckregelung?", o:["Jede Düse wird durch schnelles Öffnen/Schließen (bis 10 Hz) elektronisch getaktet; die Ausbringmenge kann geschwindigkeitsunabhängig konstant gehalten werden – auch bei sehr langsamer oder schneller Fahrt bleibt l/ha stabil","PWM erhöht nur den Druck","PWM ermöglicht Spritzen ohne Pumpe","PWM ist nur für Injektordüsen geeignet"], a:0, e:"Bei klassischer Druckregelung verändert sich mit dem Druck auch die Tropfengröße. PWM hält den Druck (und damit die Tropfengröße) konstant und variiert stattdessen die Ein-/Ausschaltfrequenz – optimale Tropfenqualität bei jeder Fahrgeschwindigkeit."},
  {c:"Recht", q:"Was sind 'Grenzwerte für Pflanzenschutzmittel im Grundwasser' und welcher Wert gilt EU-weit?", o:["0,1 µg/l pro Einzelwirkstoff; 0,5 µg/l für alle PSM-Wirkstoffe zusammen – festgelegt in der EU-Trinkwasserrichtlinie und Grundwasserrichtlinie","1 mg/l – deutlich höher als für Oberflächengewässer","Es gibt keinen EU-weiten Grenzwert","10 µg/l – nur für kanzerogene Wirkstoffe"], a:0, e:"Der 0,1-µg/l-Grenzwert gilt unabhängig von der Toxizität des Wirkstoffs – er ist ein Vorsorgewert. PSM-Wirkstoffe und ihre Metaboliten dürfen zusammen 0,5 µg/l nicht überschreiten. Überschreitungen führen zum Entzug der Zulassung."},
  {c:"Biologie", q:"Was ist 'Stickstoffmangel' beim Getreide und wie erkennt man ihn im Bestand?", o:["Gleichmäßige Gelbverfärbung aller Blätter, beginnend an den ältesten (untersten) Blättern und Blattspitzen; schlanke, helle Bestände mit geringer Bestockung – Stickstoff ist mobil und wird aus alten Blättern in neue verlagert","Braunfärbung nur der Blattspitzen ohne Ursache","Weißliche Punkte auf grünen Blättern","Rote Verfärbung der Halme"], a:0, e:"Da Stickstoff mobil ist, zeigt sich Mangel zuerst an den ältesten Blättern (Phloemmobilität). Nährstoffmangelsymptome beginnen 'von unten nach oben'. Zur Einschätzung hilft ein SPAD-Chlorophyllmeter."},
  {c:"Wirkstoffe", q:"Was sind 'Ethephon'-Produkte und wie wirken sie im Getreide?", o:["Ethephon setzt im Pflanzengewebe Ethylen frei; Ethylen als Pflanzenhormon verkürzt Internodien (Halmverkürzung), fördert Ährenaufrichtung und beschleunigt die Abreife – eingesetzt als Wachstumsregulator","Ethephon ist ein Fungizid gegen Halmbruch","Ethephon ist ein Herbizid gegen Gräser","Ethephon düngt die Pflanze mit Stickstoff"], a:0, e:"Ethephon-Produkte (z. B. Cerone, Camposan) wirken über Etyhlen-Freisetzung. Sie kürzen den oberen Halmabschnitt, senken den Schwerpunkt und reduzieren das Lagerrisiko. Wichtig: nur bei wachsenden Pflanzen einsetzen – bei Hitze kann es zu Phytotoxizität kommen."},
  {c:"Umwelt", q:"Warum ist der Zeitraum der Hauptblüte im Rapsbestand für den Bienenschutz besonders kritisch?", o:["Bienen fliegen intensiv ein und aus, sammeln Pollen und Nektar direkt aus den Blüten; Insektizide und einige Fungizide können in diesem Zeitraum massive Bienenverluste verursachen – jede Anwendung von B1-Mitteln ist verboten","Bienen fliegen nicht in blühende Bestände","Der Raps hat in der Blüte keine Nektar-Produktion","Fungizide sind in der Blüte grundsätzlich erlaubt"], a:0, e:"Zur Rapsblüte sind Bienenvölker oft direkt am Feld aufgestellt. B1-Insektizide sind strikt verboten. Fungizide (Sclerotinia-Behandlung) sollten nur abends nach dem Bienenflug und vorzugsweise ohne Bienengefährlichkeits-Einstufung eingesetzt werden."},
  {c:"Biologie", q:"Was ist der 'Anbauabstand' und die 'Fruchtfolge-Pause' bei der Bekämpfung der Kohlhernie im Raps?", o:["Mindestens 3–4 Jahre Anbaupause zwischen zwei Rapskulturen auf demselben Schlag; auch andere Kreuzblütler (Senf, Kohl, Raps-Zwischenfrüchte) verlängern das Inokulumpotenzial im Boden","Eine 1-Jahr-Pause reicht vollständig aus","Kohlhernie kann durch Fungizide vollständig bekämpft werden","Fruchtfolge hat keinen Einfluss auf Kohlhernie"], a:0, e:"Plasmodiophora-Dauersporen überdauern 10–20 Jahre im Boden! Resistente Sorten sind die wirksamste Strategie; bei stark befallenen Schlägen empfehlen sich 4–5 Jahre Raps-freie Fruchtfolge und der Verzicht auf alle Kreuzblütler als Zwischenfrucht."},
  {c:"Technik", q:"Was ist ein 'Kammerfilter' (Druckfilter mit mehreren Kammern) an einer Pflanzenschutzspritze und wozu dient die mehrstufige Filtration?", o:["Mehrstufige Filtration schützt nachgelagerte Bauteile (Ventile, Regelorgane, Düsen) vor Verstopfung; gröbere Stufen fangen grobe Partikel ab, feinere Stufen schützen die Düsen – Sicherheitsnetz für die gesamte Anlage","Kammerfilter werden nur für Fungizide benötigt","Kammerfilter ersetzen die Düsenfilter vollständig","Kammerfilter erhöhen den Druck in den Leitungen"], a:0, e:"Die Filterkaskade (Einfüllsieb → Saugfilter → Druckfilter → Düsenfilter) ist ein Sicherheitssystem. Jeder Filter hat seine Aufgabe; werden sie regelmäßig gereinigt und auf Schäden geprüft, bleibt die gesamte Anlage funktionssicher."},
  {c:"Recht", q:"Was bedeutet 'Cross-Compliance' im Zusammenhang mit dem Pflanzenschutzmitteleinsatz und welche Konsequenzen drohen bei Verstößen?", o:["Direktzahlungen (EU-Subventionen) sind an die Einhaltung bestimmter Grundanforderungen (u. a. korrekter PSM-Einsatz, Dokumentationspflicht) geknüpft; Verstöße führen zu Kürzungen der Direktzahlungen","Cross-Compliance betrifft nur den Tierschutz","PSM-Verstöße haben keinen Einfluss auf Direktzahlungen","Cross-Compliance gilt nur für Biobetriebe"], a:0, e:"Im Rahmen der GAP-Konditionalität (früher Cross-Compliance) werden Direktzahlungen an Mindeststandards geknüpft. Dazu gehören: Sachkundenachweis, Spritzen-Prüfung, Anwendungsdokumentation und Einhaltung von Gewässerabständen. Verstöße werden bei Vor-Ort-Kontrollen festgestellt."},
  {c:"Biologie", q:"Was ist die 'Biologische Bekämpfung' mit Trichogramma und bei welchem Schädling wird sie eingesetzt?", o:["Trichogramma sind Schlupfwespen, die Eier des Maiszünslers parasitieren; sie werden als Eikarten oder Kugeln über das Maisfeld verteilt – in Deutschland und der EU eine zugelassene und im Bio-Anbau häufig genutzte Methode","Trichogramma bekämpft Blattläuse","Trichogramma sind Bodenpilze","Trichogramma werden chemisch hergestellt"], a:0, e:"Die Trichogramma-Methode ist ein Parade-Beispiel für biologische Bekämpfung: Die Schlupfwespen legen ihre Eier in die Eier des Maiszünslers, die Larven der Schlupfwespe frisst die Zünsler-Larve auf. Kein PSM nötig, bienensicher, im Ökolandbau standard."},
  {c:"Wirkstoffe", q:"Was sind 'Beizmittel' (Saatgutbehandlung) und welche Vorteile haben sie gegenüber Bodenbehandlung?", o:["PSM, die direkt auf das Saatgut aufgetragen werden; Vorteile: sehr geringe Wirkstoffmenge (nur am Korn), gezielte Schutzwirkung für Keimling und Jungpflanze, keine Bodenbelastung durch Flächenbehandlung","Beizmittel sind teurer und weniger wirksam als Bodenbehandlung","Beizmittel erhöhen die Keimrate durch Nährstoffe","Beizmittel schützen nur gegen Pilze, nicht gegen Insekten"], a:0, e:"Saatgutbeizung ist ökonomisch und ökologisch effizient: minimale Wirkstoffmengen (g/100 kg Saatgut statt g/ha) schützen das Saatgut und den Keimling gezielt vor bodenbürtigen Pathogenen (Pythium, Fusarium, Tilletia) und frühen Schädlingen."},
];

let activeQuestions = [];
let currentIndex = 0;
let score = 0;
let wrongCount = 0;
let answered = 0;
let phase = 'intro'; // intro | quiz | result

const letters = ['A','B','C','D'];

function $(id){ return document.getElementById(id); }

function renderIntro() {
  phase = 'intro';
  $('stats-bar').style.display = 'none';
  $('main-content').innerHTML = `
    <div class="intro-card">
      <div class="intro-icon">🌿</div>
      <h2 class="intro-title">Prüfungstraining starten</h2>
      <p class="intro-desc">
        Du bekommst 30 zufällig ausgewählte Fragen aus allen Themenbereichen.
        Die Fragen sind so formuliert, dass du wirklich verstehst – nicht nur auswendig lernst.
      </p>
      <div class="topics-grid">
        <div class="topic-item"><span class="topic-dot"></span>Technik & Geräte</div>
        <div class="topic-item"><span class="topic-dot"></span>Pflanzenkrankheiten</div>
        <div class="topic-item"><span class="topic-dot"></span>Schädlinge & Biologie</div>
        <div class="topic-item"><span class="topic-dot"></span>Recht & Zulassung</div>
        <div class="topic-item"><span class="topic-dot"></span>Wirkstoffe & Resistenz</div>
        <div class="topic-item"><span class="topic-dot"></span>Umwelt & Gewässerschutz</div>
      </div>
      <button class="start-btn" onclick="startQuiz()">Training beginnen →</button>
    </div>
  `;
}

function startQuiz() {
  activeQuestions = [...fullPool].sort(() => Math.random() - 0.5).slice(0, 30);
  currentIndex = 0;
  score = 0;
  wrongCount = 0;
  answered = 0;
  phase = 'quiz';
  $('stats-bar').style.display = 'flex';
  updateStats();
  renderQuestion();
}

let currentShuffledOpts = []; // safe reference, no HTML attribute passing

function renderQuestion() {
  const q = activeQuestions[currentIndex];
  const progress = ((currentIndex) / 30) * 100;

  // Shuffle options and store in module-level variable
  currentShuffledOpts = q.o.map((text, i) => ({text, origIdx: i}));
  currentShuffledOpts.sort(() => Math.random() - 0.5);

  const optionsHTML = currentShuffledOpts.map((opt, pos) => `
    <button class="opt-btn" onclick="checkAnswer(${opt.origIdx})" data-orig="${opt.origIdx}">
      <span class="opt-letter">${letters[pos]}</span>
      <span>${opt.text}</span>
    </button>
  `).join('');

  $('main-content').innerHTML = `
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:${progress}%"></div></div>
      <span class="progress-label">${currentIndex + 1} / 30</span>
    </div>
    <div class="q-card">
      <div class="q-meta">
        <span class="q-category">${q.c}</span>
        <span class="q-number">Frage ${currentIndex + 1}</span>
      </div>
      <p class="q-text">${q.q}</p>
      <div class="options-grid" id="options-grid">
        ${optionsHTML}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">
        ${currentIndex < 29 ? 'Nächste Frage' : 'Ergebnis anzeigen'}
      </button>
    </div>
  `;
}

function checkAnswer(selected) {
  const q = activeQuestions[currentIndex];
  const correct = q.a;
  const explanation = q.e;

  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => b.disabled = true);

  const fb = $('feedback');
  const nextBtn = $('next-btn');

  // Highlight correct answer
  allBtns.forEach(b => {
    const orig = parseInt(b.getAttribute('data-orig'));
    if(orig === correct) b.classList.add('correct');
  });

  if(selected === correct) {
    score++;
    fb.className = 'feedback correct-fb';
    fb.innerHTML = `<span class="feedback-icon">✅</span><strong>Richtig!</strong> ${explanation}`;
  } else {
    wrongCount++;
    // Highlight the clicked wrong button
    allBtns.forEach(b => {
      if(parseInt(b.getAttribute('data-orig')) === selected) b.classList.add('wrong');
    });
    fb.className = 'feedback wrong-fb';
    fb.innerHTML = `<span class="feedback-icon">❌</span><strong>Falsch.</strong> ${explanation}`;
  }

  fb.style.display = 'block';
  nextBtn.style.display = 'block';
  answered++;
  updateStats();
}

function updateStats() {
  $('stat-score').textContent = score;
  $('stat-wrong').textContent = wrongCount;
  $('stat-pct').textContent = answered > 0 ? Math.round((score/answered)*100) + '%' : '–';
}

function nextQuestion() {
  currentIndex++;
  if(currentIndex < 30) renderQuestion();
  else showResult();
}

function showResult() {
  phase = 'result';
  const pct = Math.round((score/30)*100);
  let icon, msg;
  if(pct >= 85) { icon = '🏆'; msg = 'Hervorragende Leistung! Du bist bestens auf die Kammerprüfung vorbereitet. Wiederhole die wenigen Fehler noch einmal kurz.'; }
  else if(pct >= 70) { icon = '✅'; msg = 'Gutes Ergebnis! Noch ein paar gezielte Wiederholungen in den Schwachstellen, und die Prüfung wird kein Problem für dich.'; }
  else if(pct >= 50) { icon = '📚'; msg = 'Solide Basis, aber du solltest die Lücken schließen – besonders in Technik und Recht. Nochmal üben!'; }
  else { icon = '🔄'; msg = 'Das Ergebnis zeigt: Hier ist noch Lernbedarf. Geh die Bereiche systematisch durch und starte dann ein neues Training.'; }

  $('main-content').innerHTML = `
    <div class="result-card">
      <div class="result-icon">${icon}</div>
      <h2 class="result-title">Prüfungssimulation abgeschlossen</h2>
      <div class="score-display">
        <span class="score-number">${pct}</span>
        <span class="score-unit">%</span>
      </div>
      <div class="result-breakdown">
        <div class="breakdown-item">
          <span class="breakdown-num good">${score}</span>
          <span class="breakdown-label">Richtig</span>
        </div>
        <div class="breakdown-item">
          <span class="breakdown-num bad">${wrongCount}</span>
          <span class="breakdown-label">Falsch</span>
        </div>
        <div class="breakdown-item">
          <span class="breakdown-num">${30}</span>
          <span class="breakdown-label">Gesamt</span>
        </div>
      </div>
      <p class="result-msg">${msg}</p>
      <button class="restart-btn" onclick="renderIntro()">Neues Training starten</button>
    </div>
  `;
}

renderIntro();
</script>
</body>
</html>
