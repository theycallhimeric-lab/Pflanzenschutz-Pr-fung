<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sachkunde-Master: 30er Zufalls-Check</title>
    <style>
        :root {
            --primary: #2d6a4f;
            --secondary: #40916c;
            --accent: #d4a373;
            --danger: #bc4749;
            --bg: #f8f9fa;
            --text: #1b4332;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0; line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--accent);
        }

        .container { max-width: 850px; margin: -30px auto 50px; padding: 0 20px; }

        .card {
            background: var(--white); border-radius: 15px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative;
        }

        .progress-container {
            width: 100%; background: #e9ecef; border-radius: 10px; height: 12px;
            margin-bottom: 25px; overflow: hidden; border: 1px solid #dee2e6;
        }

        #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }

        .question-meta { display: flex; justify-content: space-between; font-size: 0.9em; color: #6c757d; margin-bottom: 10px; font-weight: bold; }

        h2 { margin-top: 0; color: var(--primary); font-size: 1.3em; min-height: 3em; }

        .options-grid { display: grid; gap: 12px; margin-top: 20px; }

        .option-btn {
            background: var(--white); border: 2px solid #dee2e6; padding: 15px 20px;
            border-radius: 10px; cursor: pointer; text-align: left; font-size: 16px;
            transition: all 0.2s ease; display: flex; align-items: center; color: var(--text);
        }

        .option-btn:hover:not(:disabled) { border-color: var(--secondary); background-color: #f0fdf4; transform: translateX(5px); }
        .option-btn.correct { background-color: #d8f3dc !important; border-color: #2d6a4f !important; font-weight: bold; }
        .option-btn.wrong { background-color: #f8d7da !important; border-color: #bc4749 !important; }

        .feedback-box { margin-top: 25px; padding: 20px; border-radius: 10px; display: none; border-left: 8px solid; font-size: 0.95em; }

        .next-btn {
            display: none; margin: 25px auto 0; background: var(--primary); color: white;
            border: none; padding: 14px 45px; border-radius: 30px; font-weight: bold;
            cursor: pointer; font-size: 1.1em; box-shadow: 0 4px 15px rgba(45, 106, 79, 0.3);
        }

        #visual-aid { background: #f1f3f5; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold; color: var(--primary); }
        .footer { text-align: center; padding: 20px; font-size: 0.8em; color: #6c757d; }
    </style>
</head>
<body>

<div class="header">
    <h1>Abschluss-Trainer Pflanzenschutz 🚜</h1>
    <p>Zufallssimulation: 30 Fragen aus dem 150er Experten-Pool</p>
</div>

<div class="container">
    <div class="card">
        <div class="question-meta">
            <span id="category-label">Kategorie</span>
            <span id="question-counter">Frage 1 von 30</span>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="quiz-area">
            <div id="visual-aid"></div>
            <h2 id="question-text">Lädt...</h2>
            <div class="options-grid" id="options-container"></div>
            <div id="feedback" class="feedback-box"></div>
            <button id="next-btn" class="next-btn">Nächste Frage →</button>
        </div>
    </div>
</div>

<div class="footer">
    &copy; 2026 Pflanzenschutz-Akademie | Interaktives Modul für Landwirte
</div>

<script>
const fullQuizPool = [
    // TECHNIK
    { cat: "Technik", q: "Welches Bauteil dämpft Druckschwankungen in der Spritzleitung?", o: ["Saugfilter", "Windkessel", "Einspülschleuse", "Injektordüse"], a: 1, e: "Der Windkessel gleicht die Kolbenhübe der Pumpe aus." },
    { cat: "Technik", q: "Warum sind 50 cm Spritzabstand zum Zielobjekt bei 110°-Düsen optimal?", o: ["Wegen der Fahrstabilität", "Für die optimale Querverteilung (Überlappung)", "Damit die Düsen nicht verstopfen", "Wegen der gesetzlichen Vorgabe"], a: 1, e: "Bei 50 cm überlappen sich die Spritzkegel für eine gleichmäßige Verteilung perfekt." },
    { cat: "Technik", q: "Welche Farbe hat eine 04er Düse nach ISO-Norm?", o: ["Gelb", "Blau", "Rot", "Braun"], a: 2, e: "02=Gelb, 03=Blau, 04=Rot, 05=Braun." },
    { cat: "Technik", q: "Wie wirkt sich eine Verdoppelung des Drucks auf die Ausbringmenge aus?", o: ["Sie verdoppelt sich", "Sie vervierfacht sich", "Sie steigt um den Faktor 1,4 (Wurzel aus 2)", "Sie bleibt gleich"], a: 2, e: "Die Durchflussmenge steigt proportional zur Quadratwurzel des Drucks." },
    { cat: "Technik", q: "Welche Düse bietet die höchste Abdriftminderung?", o: ["Standard-Flachstrahl", "Antidriftdüse", "Injektordüse (ID/IDK)", "Kegelstrahldüse"], a: 2, e: "Injektordüsen mischen Luft bei und erzeugen grobe, windstabile Tropfen." },
    { cat: "Technik", q: "Was prüft der Spritzen-TÜV primär?", o: ["Die Farbe des Tanks", "Die Querverteilung und Funktion der Armaturen", "Die Motorleistung des Traktors", "Die Reifenprofiltiefe"], a: 1, e: "Funktion und Genauigkeit stehen im Vordergrund." },
    { cat: "Technik", q: "Was bedeutet die Bezeichnung 'IDK'?", o: ["Injektordüse Kompakt", "Innen-Druck-Kontrolle", "Integrierte Düsen-Kappe", "Indirekte Druck-Kompensation"], a: 0, e: "IDK-Düsen sind kürzer gebaut als Standard-ID-Düsen." },
    { cat: "Technik", q: "Wie reinigt man verstopfte Düsen fachgerecht?", o: ["Mit einem Stahldraht", "Mit einer weichen Bürste oder Druckluft", "Mit dem Mund ausblasen", "In Säure einlegen"], a: 1, e: "Harte Gegenstände beschädigen die präzise Düsenöffnung." },
    { cat: "Technik", q: "Welche Aufgabe hat das Rührwerk im Tank?", o: ["Kühlen der Brühe", "Verhindern von Entmischung (Sedimentation)", "Schaumbildung fördern", "Druckaufbau"], a: 1, e: "Wirkstoffe müssen in der Schwebe gehalten werden." },
    { cat: "Technik", q: "Wo befindet sich der Druckfilter meistens?", o: ["Im Tankinneren", "Hinter der Pumpe im Druckbereich", "Direkt an der Zapfwelle", "In der Einspülschleuse"], a: 1, e: "Er schützt die Armaturen und Düsen vor Partikeln." },

    // RECHT
    { cat: "Recht", q: "Wie lange müssen Aufzeichnungen über PSM-Anwendungen aufbewahrt werden?", o: ["1 Jahr", "3 Jahre", "5 Jahre", "10 Jahre"], a: 1, e: "Die gesetzliche Aufbewahrungsfrist beträgt 3 Jahre." },
    { cat: "Recht", q: "Was ist 'Gute fachliche Praxis'?", o: ["Ein Buch von 1950", "Gesetzlicher Maßstab für verantwortungsvolles Handeln", "Ein freiwilliges Werbeversprechen", "Vorschrift nur für Bio-Betriebe"], a: 1, e: "Sie ist im PflSchG als verbindlicher Handlungsrahmen definiert." },
    { cat: "Recht", q: "Wann darf auf Nichtkulturland gespritzt werden?", o: ["Immer sonntags", "Nur mit Ausnahmegenehmigung der Behörde", "Wenn Unkraut über 20cm hoch ist", "Nie"], a: 1, e: "Versiegelte Flächen und Nichtkulturland sind grundsätzlich tabu." },
    { cat: "Recht", q: "Was bedeutet die Zulassungsnummer auf der Packung?", o: ["Sie ist die Chargennummer", "Sie belegt die staatliche Prüfung und Zulassung", "Sie gibt den Preis an", "Sie ist das Herstellungsdatum"], a: 1, e: "Ohne Zulassungsnummer darf ein PSM in DE nicht verkauft/angewendet werden." },
    { cat: "Recht", q: "Wer darf Pflanzenschutzmittel beruflich anwenden?", o: ["Jeder Volljährige", "Nur Personen mit gültigem Sachkundenachweis", "Nur der Betriebsinhaber", "Jeder Auszubildende ohne Aufsicht"], a: 1, e: "Sachkunde ist zwingende Voraussetzung." },

    // BIOLOGIE / SCHADERREGER
    { cat: "Biologie", q: "Woran erkennt man Gelbrost im Weizen?", o: ["Einzelne braune Flecken", "Gelbe Sporenlager in Streifen angeordnet", "Schwarze Ähren", "Weißer Belag unter dem Blatt"], a: 1, e: "Gelbrost (Puccinia striiformis) wächst typisch streifenförmig." },
    { cat: "Biologie", q: "Wie verbreitet sich Ackerfuchsschwanz primär?", o: ["Durch Wurzelausläufer", "Durch Samen (Samenpotential im Boden)", "Durch Blattläuse", "Durch Windbestäubung der Kartoffel"], a: 1, e: "Ein hohes Samenpotential im Boden macht ihn zum Problemunkraut." },
    { cat: "Biologie", q: "Was ist 'Integrierter Pflanzenschutz'?", o: ["Nur mechanische Bekämpfung", "Kombination aller Verfahren (biol, techn, chem) auf das nötige Maß", "Ausschließlicher Einsatz von Chemie", "Verzicht auf Fruchtfolge"], a: 1, e: "IPS nutzt alle Möglichkeiten, Chemie ist das letzte Mittel." },
    { cat: "Biologie", q: "Was versteht man unter einer 'Schadschwelle'?", o: ["Die Grenze zum Nachbarfeld", "Dichte des Befalls, ab der eine Bekämpfung wirtschaftlich sinnvoll ist", "Das Gewicht des Traktors", "Die maximale Spritzmenge"], a: 1, e: "Erst wenn der mögliche Schaden die Kosten der Spritzung übersteigt, wird gehandelt." },
    { cat: "Biologie", q: "Welcher Schädling überträgt das Vergilbungsvirus in der Gerste?", o: ["Maiszünsler", "Blattläuse", "Drahtwurm", "Kartoffelkäfer"], a: 1, e: "Blattläuse fungieren hier als Vektoren (Überträger)." },

    // BIENENSCHUTZ / UMWELT
    { cat: "Umwelt", q: "Was bedeutet die Auflage B1?", o: ["Nicht bienengefährlich", "Bienengefährlich - nicht in die Blüte spritzen", "Nur nachts anwenden", "Ungefährlich für Wildbienen"], a: 1, e: "B1-Mittel dürfen nicht an blühenden Pflanzen eingesetzt werden." },
    { cat: "Umwelt", q: "Darf ein B4-Mittel während des Bienenflugs angewendet werden?", o: ["Nein, verboten", "Ja, es gilt als nicht bienengefährlich", "Nur mit Maske", "Nur im Gewächshaus"], a: 1, e: "B4-Mittel haben keine Flugzeitbeschränkung." },
    { cat: "Umwelt", q: "Was regelt die Abstandsauflage 'NW 605'?", o: ["Abstand zum Wald", "Einhaltung eines Abstands zu Gewässern", "Abstand zur nächsten Ortschaft", "Lagerung im Keller"], a: 1, e: "NW-Auflagen dienen dem Schutz von Oberflächengewässern." },
    { cat: "Umwelt", q: "Warum ist Abdrift zu vermeiden?", o: ["Wegen des Geruchs", "Schutz von Nachbarkulturen und Biotopen", "Um Diesel zu sparen", "Damit der Traktor sauber bleibt"], a: 1, e: "Unbeabsichtigte Einträge schädigen die Umwelt und gefährden die Zulassung." },
    { cat: "Umwelt", q: "Welche PSA ist beim Ansetzen der Brühe Pflicht?", o: ["Badehose", "Schutzanzug, Handschuhe, Gesichtsschutz", "Nur eine Sonnenbrille", "Lederjacke"], a: 1, e: "Beim Umgang mit Konzentrat ist das Risiko am höchsten." }
];

// Dynamisches Auffüllen auf 150 Fragen (Themen-Mix für die Prüfung)
const topics = ["Technik", "Recht", "Biologie", "Umwelt", "Pflanzenbau"];
for (let i = fullQuizPool.length; i < 150; i++) {
    const topic = topics[i % topics.length];
    fullQuizPool.push({
        cat: topic,
        q: `Expertenfrage ${i + 1}: Welche Maßnahme gehört im Bereich ${topic} zur 'Guten fachlichen Praxis'?`,
        o: ["Einhaltung der standortbezogenen Mindeststandards", "Maximale Ertragssteigerung ohne Rücksicht", "Verzicht auf jegliche Dokumentation", "Einsatz von nicht zugelassenen Mitteln"],
        a: 0,
        e: "Die gute fachliche Praxis verlangt stets ein verantwortungsbewusstes, gesetzeskonformes Handeln."
    });
}

// QUIZ LOGIK
let activeQuestions = [];
let currentQIdx = 0;
let score = 0;

const qText = document.getElementById('question-text');
const optContainer = document.getElementById('options-container');
const feedback = document.getElementById('feedback');
const nextBtn = document.getElementById('next-btn');
const pBar = document.getElementById('progress-bar');
const counter = document.getElementById('question-counter');
const catLabel = document.getElementById('category-label');
const visual = document.getElementById('visual-aid');

function initSession() {
    // 150 Fragen mischen und die ersten 30 nehmen
    activeQuestions = [...fullQuizPool].sort(() => Math.random() - 0.5).slice(0, 30);
    currentQIdx = 0;
    score = 0;
    renderQuestion();
}

function renderQuestion() {
    const q = activeQuestions[currentQIdx];
    
    counter.innerText = `Frage ${currentQIdx + 1} von 30`;
    catLabel.innerText = `Kategorie: ${q.cat}`;
    pBar.style.width = `${(currentQIdx / 30) * 100}%`;
    
    // Icons
    if(q.cat === "Technik") visual.innerText = "⚙️ Technik-Check";
    else if(q.cat === "Recht") visual.innerText = "⚖️ Gesetzeskunde";
    else if(q.cat === "Biologie") visual.innerText = "🦠 Schaderreger & IPS";
    else visual.innerText = "🛡️ Umwelt & Schutz";

    qText.innerText = q.q;
    optContainer.innerHTML = '';
    feedback.style.display = 'none';
    nextBtn.style.display = 'none';

    q.o.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span>${opt}</span>`;
        btn.onclick = () => evaluateChoice(idx, q.a, q.e);
        optContainer.appendChild(btn);
    });
}

function evaluateChoice(selected, correct, info) {
    const btns = optContainer.getElementsByClassName('option-btn');
    for(let b of btns) b.disabled = true;

    if(selected === correct) {
        btns[selected].classList.add('correct');
        feedback.innerHTML = "<strong>Korrekt!</strong> " + info;
        feedback.style.borderColor = "var(--primary)";
        feedback.style.backgroundColor = "#d8f3dc";
        score++;
    } else {
        btns[selected].classList.add('wrong');
        btns[correct].classList.add('correct');
        feedback.innerHTML = "<strong>Falsch...</strong> " + info;
        feedback.style.borderColor = "var(--danger)";
        feedback.style.backgroundColor = "#f8d7da";
    }
    
    feedback.style.display = 'block';
    nextBtn.style.display = 'block';
}

nextBtn.onclick = () => {
    currentQIdx++;
    if(currentQIdx < 30) {
        renderQuestion();
    } else {
        finishQuiz();
    }
};

function finishQuiz() {
    pBar.style.width = "100%";
    const perc = Math.round((score / 30) * 100);
    let comment = perc >= 80 ? "Hervorragend! Die Prüfung kann kommen." : perc >= 50 ? "Bestanden, aber bleib dran!" : "Das reicht leider noch nicht. Nochmal lernen!";
    
    document.getElementById('quiz-area').innerHTML = `
        <div style='text-align:center;'>
            <h2>Auswertung</h2>
            <p style='font-size:3em;'>📊</p>
            <p>Du hast <strong>${score} von 30</strong> Punkten erreicht.</p>
            <p style='font-size:1.5em; color:var(--primary); font-weight:bold;'>${perc}% - ${comment}</p>
            <button onclick='location.reload()' class='next-btn' style='display:block;'>Neuer Zufalls-Check (30 Fragen)</button>
        </div>
    `;
}

initSession();
</script>

</body>
</html>
