let activeQuestions = [];
let currentIndex = 0;
let score = 0;

function initQuiz() {
    // 30 zufällige Fragen aus dem Pool wählen
    activeQuestions = [...fullPool].sort(() => Math.random() - 0.5).slice(0, 30);
    currentIndex = 0;
    score = 0;
    showQuestion();
}

function showQuestion() {
    const q = activeQuestions[currentIndex];
    document.getElementById('cat-label').innerText = q.c;
    document.getElementById('counter-label').innerText = `Frage ${currentIndex + 1} / 30`;
    document.getElementById('progress-bar').style.width = `${(currentIndex / 30) * 100}%`;
    document.getElementById('q-text').innerText = q.q;
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    // Antwortoptionen mischen
    let opts = q.o.map((text, i) => ({text, i}));
    opts.sort(() => Math.random() - 0.5);

    opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt.text;
        btn.onclick = () => checkAnswer(opt.i, q.a, q.e);
        container.appendChild(btn);
    });

    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
}

function checkAnswer(selected, correct, explanation) {
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);
    const feedback = document.getElementById('feedback');
    
    if(selected === correct) {
        score++;
        feedback.style.borderColor = "var(--secondary)"; 
        feedback.style.background = "var(--correct-bg)";
        feedback.innerHTML = "✅ <b>Richtig!</b> " + explanation;
    } else {
        feedback.style.borderColor = "var(--danger)"; 
        feedback.style.background = "var(--wrong-bg)";
        feedback.innerHTML = "❌ <b>Leider falsch.</b> " + explanation;
    }
    feedback.style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
}

document.getElementById('next-btn').onclick = () => {
    currentIndex++;
    if(currentIndex < 30) showQuestion();
    else showResult();
};

function showResult() {
    const p = Math.round((score / 30) * 100);
    let msg = p >= 70 ? "Hervorragend! Du bist bereit für die Kammerprüfung." : "Das reicht noch nicht ganz. Wiederhole besonders die technischen Details!";
    
    document.getElementById('quiz-container').innerHTML = `
        <div class="result-screen">
            <h2 style="border:none; text-align:center">Ergebnis deiner Prüfungssimulation</h2>
            <div class="score-big">${p}%</div>
            <p>Du hast <b>${score} von 30</b> Fragen richtig beantwortet.</p>
            <p style="margin:20px 0">${msg}</p>
            <button onclick="location.reload()" class="next-btn" style="display:block">Neues Training starten (30 neue Fragen)</button>
        </div>
    `;
}

initQuiz();
</script>
</body>
</html>
